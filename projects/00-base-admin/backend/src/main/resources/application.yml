server:
  port: 8080

spring:
  application:
    name: base-admin-backend
  datasource:
    url: jdbc:h2:file:./data/base-admin;MODE=MySQL;AUTO_SERVER=TRUE;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      encoding: UTF-8
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

springdoc:
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  jwt:
    secret: cHJvamVjdGV4YW1wbGUtdGVtcGxhdGUtZmFjdG9yeS1iYXNlLWp3dC1zZWNyZXQ=
    expiration-minutes: 720
    issuer: projectexample-base-admin
